name: Build Modules and APKs
on:
  workflow_call:
    inputs:
      from_ci:
        type: boolean
        required: false
        default: true

  workflow_dispatch:

jobs:
  run:
    permissions: write-all
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-java@v5
        with:
          distribution: "zulu"
          java-version: "21"

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: true

      - name: Install APKMirror downloader
        run: python -m pip install --disable-pip-version-check -r requirements-apkmirror.txt

      - name: Update config
        if: ${{ inputs.from_ci }}
        run: |
          if git checkout origin/update build.md; then
            UPDATE_CFG=$(./build.sh config.toml --config-update)
            if [ "$UPDATE_CFG" ]; then
              echo "$UPDATE_CFG" >config.json
            fi
          fi

      - name: Get next version code
        id: next_ver_code
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RELEASE_CODE=$(gh release list --limit 100 --json tagName --jq \
            '[.[].tagName | select(test("^[0-9]+$")) | tonumber] | max // 0')
          HISTORY_CODE=0
          if git rev-parse --verify origin/update >/dev/null 2>&1; then
            HISTORY_CODE=$(git log origin/update --format='%s' |
              sed -nE 's/^Bump version ([0-9]+)$/\1/p' |
              sort -n | tail -1)
            HISTORY_CODE=${HISTORY_CODE:-0}
          fi
          if ((HISTORY_CODE > RELEASE_CODE)); then
            LAST_CODE=$HISTORY_CODE
          else
            LAST_CODE=$RELEASE_CODE
          fi
          echo "NEXT_VER_CODE=$((LAST_CODE + 1))" >>"$GITHUB_OUTPUT"

      - name: Build modules and APKs
        run: if [ -f "config.json" ]; then ./build.sh config.json; else ./build.sh config.toml; fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: $GITHUB_REPOSITORY
          NEXT_VER_CODE: ${{ steps.next_ver_code.outputs.NEXT_VER_CODE }}

      - name: Verify complete output set
        shell: bash
        run: |
          for APP in youtube-morphe youtube-music-morphe twitter-piko instagram-piko; do
            compgen -G "build/${APP}-v*.apk" >/dev/null ||
              { echo "::error::Missing ${APP} APK"; exit 1; }
            compgen -G "build/${APP}-module-v*.zip" >/dev/null ||
              { echo "::error::Missing ${APP} module"; exit 1; }
          done

      - name: Get output
        id: get_output
        run: |
          DELIM="$(openssl rand -hex 8)"
          echo "BUILD_LOG<<${DELIM}" >>"$GITHUB_OUTPUT"
          cat build.md >>"$GITHUB_OUTPUT"
          echo "${DELIM}" >>"$GITHUB_OUTPUT"
          cp -f build.md build.tmp

      - name: Upload release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.next_ver_code.outputs.NEXT_VER_CODE }}
          BODY: ${{ steps.get_output.outputs.BUILD_LOG }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" --title "Release" --notes "$BODY"
            gh release upload "$TAG" ./build/* --clobber
          else
            gh release create "$TAG" ./build/* --title "Release" --notes "$BODY"
          fi

      - name: Update module changelogs
        run: |
          git checkout -f update || git switch --discard-changes --orphan update
          cp -f build.tmp build.md

          get_update_json() {
            echo "{
            \"version\": \"$1\",
            \"versionCode\": ${{ steps.next_ver_code.outputs.NEXT_VER_CODE }},
            \"zipUrl\": \"$2\",
            \"changelog\": \"https://raw.githubusercontent.com/$GITHUB_REPOSITORY/update/build.md\"
          }"
          }

          cd build || { echo "build folder not found"; exit 1; }
          for OUTPUT in *module*.zip; do
            [ "$OUTPUT" = "*module*.zip" ] && continue
            ZIP_S=$(unzip -p "$OUTPUT" module.prop)
            if ! UPDATE_JSON=$(echo "$ZIP_S" | grep updateJson); then continue; fi
            UPDATE_JSON="${UPDATE_JSON##*/}"
            VER=$(echo "$ZIP_S" | grep version=)
            VER="${VER##*=}"
            DLURL="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/releases/download/${{ steps.next_ver_code.outputs.NEXT_VER_CODE }}/${OUTPUT}"
            get_update_json "$VER" "$DLURL" >"../$UPDATE_JSON"
          done
          cd ..

          find . -name "*-update.json" | grep . || : >dummy-update.json

      - name: Commit module changelogs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add build.md *-update.json

          if ! git diff --cached --quiet; then
            git commit -m "Bump version ${{ steps.next_ver_code.outputs.NEXT_VER_CODE }}"
            git push origin HEAD:update
          else
            echo "no changes!"
          fi
