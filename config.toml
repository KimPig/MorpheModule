enable-module-update = true
parallel-jobs = 1

# Build both KernelSU/Magisk modules and directly installable APKs.
# Twitter and Instagram use the pinned Piko development release until the
# stable compatibility issue is resolved. Their stock APKs are pinned separately.

[YouTube-Morphe]
app-name = "YouTube"
pkg-name = "com.google.android.youtube"
patches-source = "MorpheApp/morphe-patches"
cli-source = "MorpheApp/morphe-cli"
rv-brand = "Morphe"
build-mode = "both"
version = "auto"
apkmirror-dlurl = "https://www.apkmirror.com/apk/google-inc/youtube"
uptodown-dlurl = "https://youtube.en.uptodown.com/android"
archive-dlurl = "https://archive.org/download/jhc-apks/apks/com.google.android.youtube"

[YouTube-Music-Morphe]
app-name = "YouTube Music"
pkg-name = "com.google.android.apps.youtube.music"
patches-source = "MorpheApp/morphe-patches"
cli-source = "MorpheApp/morphe-cli"
rv-brand = "Morphe"
build-mode = "both"
version = "auto"
arch = "arm64-v8a"
apkmirror-dlurl = "https://www.apkmirror.com/apk/google-inc/youtube-music"
uptodown-dlurl = "https://youtube-music.en.uptodown.com/android"
archive-dlurl = "https://archive.org/download/jhc-apks/apks/com.google.android.apps.youtube.music"

[Twitter-Piko]
app-name = "Twitter"
pkg-name = "com.twitter.android"
patches-source = "crimera/piko"
patches-version = "v3.8.0-dev.6"
cli-source = "MorpheApp/morphe-cli"
rv-brand = "Piko"
build-mode = "both"
version = "12.7.1-release.0"
arch = "arm64-v8a"
dpi = "120-640dpi"
app-label = "Twitter"
include-stock = "split"
direct-dlurl = "https://github.com/KimPig/MorpheModule/releases/download/stock-apks/com.twitter.android-12.7.1-release.0-arm64-v8a.apkm"
apkmirror-dlurl = "https://www.apkmirror.com/apk/x-corp/twitter"
uptodown-dlurl = "https://twitter.en.uptodown.com/android"
included-patches = "'Bring back twitter'"

[Instagram-Piko]
app-name = "Instagram"
pkg-name = "com.instagram.android"
patches-source = "crimera/piko"
patches-version = "v3.8.0-dev.6"
cli-source = "MorpheApp/morphe-cli"
rv-brand = "Piko"
build-mode = "both"
version = "435.0.0.37.76"
arch = "arm64-v8a"
dpi = "120-640dpi"
include-stock = "split"
direct-dlurl = "https://github.com/KimPig/MorpheModule/releases/download/stock-apks/com.instagram.android-435.0.0.37.76-arm64-v8a.apkm"
apkmirror-dlurl = "https://www.apkmirror.com/apk/instagram/instagram-instagram/"
uptodown-dlurl = "https://instagram.en.uptodown.com/android"
