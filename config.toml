enable-module-update = true
parallel-jobs = 1

# Build only Magisk/KernelSU modules for the requested apps.
# Piko uses the newest pre-release patch bundle because recent stable releases
# can be incompatible with current Twitter/X and Instagram versions.

[YouTube-Morphe]
app-name = "YouTube"
patches-source = "MorpheApp/morphe-patches"
cli-source = "MorpheApp/morphe-cli"
rv-brand = "Morphe"
build-mode = "module"
version = "auto"
apkmirror-dlurl = "https://www.apkmirror.com/apk/google-inc/youtube"
uptodown-dlurl = "https://youtube.en.uptodown.com/android"
archive-dlurl = "https://archive.org/download/jhc-apks/apks/com.google.android.youtube"

[Twitter-Piko]
app-name = "Twitter"
pkg-name = "com.twitter.android"
patches-source = "crimera/piko"
patches-version = "dev"
cli-source = "MorpheApp/morphe-cli"
rv-brand = "Piko"
build-mode = "module"
version = "auto"
include-stock = "split"
uptodown-dlurl = "https://twitter.en.uptodown.com/android"
included-patches = "'Bring back twitter'"

[Instagram-Piko]
app-name = "Instagram"
pkg-name = "com.instagram.android"
patches-source = "crimera/piko"
patches-version = "dev"
cli-source = "MorpheApp/morphe-cli"
rv-brand = "Piko"
build-mode = "module"
version = "auto"
arch = "arm64-v8a"
dpi = "360-480dpi"
include-stock = "split"
apkmirror-dlurl = "https://www.apkmirror.com/apk/instagram/instagram-instagram/"
uptodown-dlurl = "https://instagram.en.uptodown.com/android"
